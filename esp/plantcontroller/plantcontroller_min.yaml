# Enable logging
logger:

# Enable Home Assistant API
#api:

ota:

# Enable I2C
i2c:
  sda: D2
  scl: D1
  scan: True

web_server:
  port: 80

sensor:
  # measure lux
  # - platform: bh1750
  #   name: "BH1750 Light Sensor"
  #   address: 0x23
  #   update_interval: 5s
  #   id: bh1750_sensor
  # measure soil moisture percentage
  - platform: adc
    pin: A0
    name: soil1
    id: soil1
    update_interval: 10s
    unit_of_measurement: "%"
    filters:
    - median:
        window_size: 7
        send_every: 4
        send_first_at: 1
    - calibrate_linear:
        - 0.85 -> 0.00
        - 0.44 -> 100.00
    - lambda: if (x < 1) return 0; else return (x);
    accuracy_decimals: 2
  # measure RH (+temp opt.)
  - platform: htu21d
    temperature:
      name: "Temperature"
      id: htu21d_temperature
    humidity:
      name: "Humidity"
      id: htu21d_humidity
    heater:
      name: "Heater"
    update_interval: 10s
  # measure leaf temp
  - platform: mlx90614
    ambient:
      name: "Ambient"
    object:
      name: "Object"
      id: mlx_object_temperature
    update_interval: 10s
