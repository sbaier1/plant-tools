number:
  - platform: template
    name: "Target VPD"
    id: target_vpd_slider
    min_value: 800.0
    max_value: 1700.0
    step: 1.0
    unit_of_measurement: "Pa"
    optimistic: true
    initial_value: 1200.0
    set_action:
      - lambda: |-
          id(target_vpd) = x;
          ESP_LOGD("custom", "Target VPD set to: %.2f Pa", x);